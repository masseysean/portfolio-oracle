<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Oracle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #080b10; color: #e8eaf0; font-family: 'DM Mono', 'Courier New', monospace; min-height: 100vh; }
    input[type=range] { accent-color: #00ff87; width: 100%; cursor: pointer; }
    input[type=number], input[type=text] {
      background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1);
      color: #e8eaf0; border-radius: 6px; padding: 8px 10px;
      font-family: 'DM Mono', monospace; font-size: 12px; width: 100%; outline: none; transition: border-color .2s;
    }
    input[type=number]:focus, input[type=text]:focus { border-color: #00ff87; }
    input[type=checkbox] { accent-color: #00ff87; cursor: pointer; }
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-thumb { background: #00ff8728; border-radius: 3px; }
    .card { background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.07); border-radius: 12px; padding: 20px; }
    .stat { background: rgba(0,255,135,.04); border: 1px solid rgba(0,255,135,.13); border-radius: 10px; padding: 15px 18px; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; letter-spacing: .04em; }
    .g   { background: rgba(0,255,135,.15); color: #00ff87; }
    .y   { background: rgba(255,209,102,.15); color: #ffd166; }
    .r   { background: rgba(255,107,107,.15); color: #ff6b6b; }
    .pu  { background: rgba(167,139,250,.15); color: #a78bfa; }
    .ob  { background: rgba(167,139,250,.1); color: #c4b5fd; border: 1px solid rgba(167,139,250,.2); }
    label { font-size: 11px; color: #666; letter-spacing: .07em; text-transform: uppercase; display: block; margin-bottom: 5px; }
    .sr  { display: flex; align-items: center; gap: 10px; }
    .sv  { font-size: 13px; color: #00ff87; font-weight: 500; min-width: 80px; text-align: right; white-space: nowrap; }
    .tab { cursor: pointer; padding: 7px 16px; border-radius: 6px; border: none; font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; letter-spacing: .04em; transition: all .2s; }
    .on  { background: #00ff87; color: #080b10; }
    .off { background: transparent; color: #555; border: 1px solid rgba(255,255,255,.08); }
    .off:hover { color: #aaa; }
    .btn { cursor: pointer; border: none; border-radius: 6px; padding: 7px 14px; font-family: 'DM Mono', monospace; font-size: 12px; transition: all .2s; }
    .bp  { background: #00ff87; color: #080b10; font-weight: 600; }
    .bp:hover { background: #00e676; }
    .bp:disabled { opacity: .5; cursor: not-allowed; }
    .bg2 { background: transparent; color: #555; border: 1px solid rgba(255,255,255,.08); }
    .bg2:hover { color: #ff6b6b; border-color: rgba(255,107,107,.3); }
    .sec { font-family: 'Syne', sans-serif; font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: #3a3a3a; margin-bottom: 14px; }
    th { text-align: left; padding: 7px 10px; color: #3a3a3a; font-weight: 400; font-size: 10px; letter-spacing: .06em; border-bottom: 1px solid rgba(255,255,255,.06); }
    td { padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,.04); font-size: 12px; }
    tr:last-child td { border-bottom: none; }
    table { width: 100%; border-collapse: collapse; }
    @media (max-width: 700px) {
      .grid-2 { grid-template-columns: 1fr !important; }
      .hide-mobile { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef, Fragment } = React;
    const {
      AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip,
      ResponsiveContainer, ReferenceLine, PieChart, Pie, Cell
    } = Recharts;

    // ── Holdings ─────────────────────────────────────────────────────────
    // dca:true  → monthly contributions + drift tracking
    // dca:false → value tracked + live price, no DCA, no drift target
    const INITIAL_HOLDINGS = [
      { symbol:"IVV",    name:"iShares S&P 500 (ASX)",     value:42566, color:"#00ff87", dca:true,  targetPct:38.5, owner:"Sean"    },
      { symbol:"VEU",    name:"Vanguard All-World ex-US",   value:16196, color:"#60efff", dca:true,  targetPct:23.0, owner:"Sean"    },
      { symbol:"VGE",    name:"Vanguard Emerging Markets",  value:13206, color:"#ff6b6b", dca:true,  targetPct:19.0, owner:"Sean"    },
      { symbol:"G200",   name:"iShares S&P/ASX 200",        value:5881,  color:"#ffd166", dca:true,  targetPct:17.5, owner:"Sean"    },
      { symbol:"IBTC",   name:"BetaShares Bitcoin ETF",     value:39713, color:"#f97316", dca:true,  targetPct:2.0,  owner:"Sean"    },
      { symbol:"VDHG",   name:"Vanguard Diversified HG",    value:20000, color:"#a78bfa", dca:false, targetPct:null, owner:"Sean"    },
      { symbol:"VDHG-N", name:"Vanguard Diversified HG",    value:5487,  color:"#c4b5fd", dca:false, targetPct:null, owner:"Nadia"   },
      { symbol:"VDHG-E", name:"Vanguard Diversified HG",    value:5487,  color:"#ddd6fe", dca:false, targetPct:null, owner:"Enzo"    },
    ];

    const STORAGE_KEY = "portfolio_oracle_v1";

    const fmt  = n => n >= 1e6 ? `$${(n/1e6).toFixed(2)}M` : `$${Math.round(n).toLocaleString()}`;
    const fmtS = n => n >= 1e6 ? `$${(n/1e6).toFixed(1)}M` : `$${(n/1000).toFixed(0)}k`;
    const fmtP = n => `${n.toFixed(1)}%`;

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch { return null; }
    }

    function App() {
      const saved = loadState();

      const [phase1Monthly, setPhase1Monthly] = useState(saved?.phase1Monthly ?? 2500);
      const [phase2Monthly, setPhase2Monthly] = useState(saved?.phase2Monthly ?? 5500);
      const [phaseSwitch,   setPhaseSwitch]   = useState(saved?.phaseSwitch   ?? 5);
      const [annualReturn,  setAnnualReturn]  = useState(saved?.annualReturn  ?? 8.5);
      const [currentAge,    setCurrentAge]    = useState(saved?.currentAge    ?? 33);
      const [targetAge,     setTargetAge]     = useState(saved?.targetAge     ?? 45);
      const [targetAmount,  setTargetAmount]  = useState(saved?.targetAmount  ?? 1200000);
      const [holdings,      setHoldings]      = useState(saved?.holdings      ?? INITIAL_HOLDINGS);
      const [lumpSums,      setLumpSums]      = useState(saved?.lumpSums      ?? [
        { id:1, label:"FMG Annual Rotation", amount:45000, yearOffset:0, recurring:true },
      ]);
      const [newLump,    setNewLump]    = useState({ label:"", amount:"", yearOffset:"", recurring:false });
      const [etfPrices,  setEtfPrices]  = useState({});
      const [etfLoading, setEtfLoading] = useState(false);
      const [etfError,   setEtfError]   = useState("");
      const [activeTab,  setActiveTab]  = useState("projection");
      const [saved_ok,   setSavedOk]    = useState(false);
      const nextId = useRef(20);

      const years = targetAge - currentAge;

      // ── Persist to localStorage ────────────────────────────────────────
      const saveState = () => {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify({
            phase1Monthly, phase2Monthly, phaseSwitch, annualReturn,
            currentAge, targetAge, targetAmount, holdings, lumpSums
          }));
          setSavedOk(true);
          setTimeout(() => setSavedOk(false), 2000);
        } catch {}
      };

      // ── Live price enrichment ──────────────────────────────────────────
      const enrich = h => {
        const key = h.symbol.startsWith("VDHG") ? "VDHG" : h.symbol;
        const p = etfPrices[key];
        if (!p?.price) return { ...h, liveValue: h.value, chg: null };
        return { ...h, liveValue: Math.round(h.value * (1 + parseFloat(p.change)/100)), chg: parseFloat(p.change) };
      };

      const liveHoldings = holdings.map(enrich);
      const liveTotal    = liveHoldings.reduce((s,h) => s + h.liveValue, 0);
      const startBalance = holdings.reduce((s,h) => s + h.value, 0);

      const dcaHoldings = liveHoldings.filter(h => h.dca);
      const dcaTotal    = dcaHoldings.reduce((s,h) => s + h.liveValue, 0);
      const withDrift   = dcaHoldings.map(h => ({
        ...h,
        actual: dcaTotal > 0 ? (h.liveValue/dcaTotal)*100 : 0,
        drift:  dcaTotal > 0 ? (h.liveValue/dcaTotal)*100 - h.targetPct : -h.targetPct,
      }));
      const mostUnderweight = [...withDrift].sort((a,b) => a.drift - b.drift)[0];
      const observedHoldings = liveHoldings.filter(h => !h.dca);

      // ── Fetch ETF prices via Anthropic API ────────────────────────────
      const fetchPrices = useCallback(async () => {
        setEtfLoading(true); setEtfError("");
        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({
              model:"claude-sonnet-4-20250514",
              max_tokens:1200,
              tools:[{ type:"web_search_20250305", name:"web_search" }],
              messages:[{ role:"user", content:`Search for today's current ASX share prices for these ETFs: IVV, VEU, VGE, G200, IBTC, VDHG. All ASX-listed, traded in AUD. Return ONLY raw JSON, no markdown: {"IVV":{"price":123.45,"change":0.5},...} for all six tickers.` }]
            })
          });
          const data  = await res.json();
          const text  = (data.content||[]).map(i => i.text||"").join(" ");
          const match = text.match(/\{[\s\S]*?\}/);
          if (match) setEtfPrices(JSON.parse(match[0]));
          else setEtfError("Could not parse price data — try refreshing");
        } catch { setEtfError("Fetch failed — check your connection"); }
        setEtfLoading(false);
      }, []);

      // ── Projection engine ──────────────────────────────────────────────
      const buildProjection = useCallback(() => {
        const rows = []; let bal = startBalance;
        const mRate = annualReturn / 100 / 12;
        for (let y = 0; y <= years; y++) {
          const monthly = y < phaseSwitch ? phase1Monthly : phase2Monthly;
          let yb = bal;
          for (let m = 0; m < 12; m++) yb = yb*(1+mRate) + monthly;
          let lump = 0;
          lumpSums.forEach(ls => { if (ls.recurring) lump += ls.amount; else if (y === ls.yearOffset) lump += ls.amount; });
          yb += lump;
          rows.push({ age:currentAge+y, year:y, balance:Math.round(yb), monthly, lumpTotal:lump, label:`Age ${currentAge+y}` });
          bal = yb;
        }
        return rows;
      }, [startBalance, phase1Monthly, phase2Monthly, phaseSwitch, annualReturn, currentAge, years, lumpSums]);

      const proj     = buildProjection();
      const finalBal = proj[proj.length-1]?.balance ?? 0;
      const crossAge = proj.find(p => p.balance >= targetAmount)?.age;

      const addLump = () => {
        if (!newLump.label || !newLump.amount) return;
        setLumpSums(p => [...p, { id:nextId.current++, label:newLump.label, amount:parseFloat(newLump.amount), yearOffset:parseInt(newLump.yearOffset)||0, recurring:newLump.recurring }]);
        setNewLump({ label:"", amount:"", yearOffset:"", recurring:false });
      };

      const ChartTip = ({ active, payload }) => {
        if (!active || !payload?.length) return null;
        const d = payload[0].payload;
        return (
          <div style={{ background:"rgba(8,11,16,.97)", border:"1px solid rgba(0,255,135,.25)", borderRadius:8, padding:"12px 16px", fontFamily:"DM Mono,monospace", fontSize:12 }}>
            <div style={{ color:"#00ff87", fontWeight:700, marginBottom:5 }}>Age {d.age}</div>
            <div style={{ color:"#fff" }}>Portfolio: <b style={{ color:"#00ff87" }}>{fmt(d.balance)}</b></div>
            <div style={{ color:"#aaa" }}>Monthly: {fmt(d.monthly)}</div>
            {d.lumpTotal > 0 && <div style={{ color:"#ffd166" }}>Injected: +{fmt(d.lumpTotal)}</div>}
            {d.balance >= targetAmount && <div style={{ color:"#00ff87", marginTop:4 }}>✓ Target reached</div>}
          </div>
        );
      };

      const pieData = liveHoldings.map(h => ({ name:h.symbol, value:h.liveValue, color:h.color }));

      // ── Render ─────────────────────────────────────────────────────────
      return (
        <div style={{ minHeight:"100vh", background:"#080b10", color:"#e8eaf0", fontFamily:"DM Mono,Courier New,monospace", paddingBottom:60 }}>

          {/* ── Header ── */}
          <div style={{ background:"rgba(0,0,0,.45)", borderBottom:"1px solid rgba(255,255,255,.06)", padding:"18px 24px", display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:12 }}>
            <div>
              <div style={{ fontFamily:"'Syne',sans-serif", fontSize:20, fontWeight:800, letterSpacing:"-.02em", color:"#fff" }}>
                PORTFOLIO <span style={{ color:"#00ff87" }}>ORACLE</span>
              </div>
              <div style={{ fontSize:10, color:"#3a3a3a", marginTop:3, letterSpacing:".1em" }}>WORK OPTIONAL @ {targetAge} · SEAN & CHARMAIN</div>
            </div>
            <div style={{ display:"flex", gap:6, flexWrap:"wrap", alignItems:"center" }}>
              {[["projection","📈 Projection"],["holdings","💼 Holdings"],["inputs","⚙️ Inputs"],["etf","🌐 ETF Prices"]].map(([k,l]) => (
                <button key={k} className={`tab ${activeTab===k?"on":"off"}`} onClick={() => setActiveTab(k)}>{l}</button>
              ))}
              <button className="btn bp" onClick={saveState} style={{ marginLeft:8 }}>
                {saved_ok ? "✓ Saved" : "💾 Save"}
              </button>
            </div>
          </div>

          <div style={{ maxWidth:1140, margin:"0 auto", padding:"22px 18px" }}>

            {/* ── KPIs ── */}
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))", gap:10, marginBottom:22 }}>
              {[
                { label:"Total Portfolio", val:fmt(liveTotal),                                sub:"all holdings · live",           accent:"#00ff87" },
                { label:"Projected @ 45",  val:fmt(finalBal),                                 sub:`${fmt(Math.abs(finalBal-targetAmount))} ${finalBal>=targetAmount?"above":"below"} target`, accent:"#00ff87" },
                { label:"Target Crossed",  val:crossAge?`Age ${crossAge}`:"—",                sub:crossAge?`${crossAge-currentAge}yr away`:"adjust inputs", accent:crossAge&&crossAge<=44?"#00ff87":"#ffd166" },
                { label:"DCA This Month",  val:mostUnderweight?.symbol||"—",                  sub:`${fmtP(Math.abs(mostUnderweight?.drift||0))} underweight`, accent:"#60efff" },
                { label:"VDHG (Observed)", val:fmt(observedHoldings.reduce((s,h)=>s+h.liveValue,0)), sub:"tracked · no contributions", accent:"#a78bfa" },
              ].map(k => (
                <div key={k.label} className="stat">
                  <div style={{ fontSize:10, color:"#444", letterSpacing:".07em", textTransform:"uppercase", marginBottom:5 }}>{k.label}</div>
                  <div style={{ fontSize:18, fontWeight:700, color:k.accent, fontFamily:"'Syne',sans-serif" }}>{k.val}</div>
                  <div style={{ fontSize:10, color:"#3a3a3a", marginTop:3 }}>{k.sub}</div>
                </div>
              ))}
            </div>

            {/* ══ PROJECTION ══ */}
            {activeTab==="projection" && (
              <div style={{ display:"flex", flexDirection:"column", gap:18 }}>
                <div className="card">
                  <div className="sec">Portfolio Growth to Age {targetAge}</div>
                  <ResponsiveContainer width="100%" height={300}>
                    <AreaChart data={proj} margin={{ top:10, right:8, left:8, bottom:0 }}>
                      <defs>
                        <linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
                          <stop offset="5%"  stopColor="#00ff87" stopOpacity={0.2}/>
                          <stop offset="95%" stopColor="#00ff87" stopOpacity={0}/>
                        </linearGradient>
                      </defs>
                      <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,.04)"/>
                      <XAxis dataKey="label" tick={{ fill:"#3a3a3a", fontSize:10, fontFamily:"DM Mono" }} axisLine={false} tickLine={false}/>
                      <YAxis tickFormatter={fmtS} tick={{ fill:"#3a3a3a", fontSize:10, fontFamily:"DM Mono" }} axisLine={false} tickLine={false} width={56}/>
                      <Tooltip content={<ChartTip/>}/>
                      <ReferenceLine y={targetAmount} stroke="#60efff" strokeDasharray="5 3" strokeOpacity={.4}
                        label={{ value:`TARGET ${fmtS(targetAmount)}`, fill:"#60efff", fontSize:9, fontFamily:"DM Mono", position:"insideTopLeft" }}/>
                      <ReferenceLine x={`Age ${currentAge+phaseSwitch}`} stroke="#ffd166" strokeDasharray="4 3" strokeOpacity={.35}
                        label={{ value:"PHASE 2", fill:"#ffd166", fontSize:9, fontFamily:"DM Mono" }}/>
                      <Area type="monotone" dataKey="balance" stroke="#00ff87" strokeWidth={2} fill="url(#ag)"
                        dot={false} activeDot={{ r:4, fill:"#00ff87", stroke:"#080b10", strokeWidth:2 }}/>
                    </AreaChart>
                  </ResponsiveContainer>
                </div>

                <div className="card">
                  <div className="sec">Year-by-Year Milestones</div>
                  <div style={{ overflowX:"auto" }}>
                    <table>
                      <thead><tr><th>Age</th><th>Portfolio</th><th>Monthly</th><th>Injected</th><th>Progress</th><th>Status</th></tr></thead>
                      <tbody>
                        {proj.map((row,i) => {
                          const pct = Math.min(100,(row.balance/targetAmount)*100);
                          const hit = row.balance >= targetAmount;
                          const sw  = row.year === phaseSwitch;
                          return (
                            <tr key={i} style={{ background:hit&&proj[i-1]?.balance<targetAmount?"rgba(0,255,135,.04)":"transparent" }}>
                              <td style={{ color:row.age===targetAge?"#00ff87":"#ccc", fontWeight:row.age===targetAge?700:400 }}>{row.age}{row.age===targetAge?" ★":""}</td>
                              <td style={{ color:"#fff", fontWeight:500 }}>{fmt(row.balance)}</td>
                              <td style={{ color:sw?"#ffd166":"#666" }}>{fmt(row.monthly)}{sw?" ↑":""}</td>
                              <td style={{ color:row.lumpTotal>0?"#ffd166":"#2a2a2a" }}>{row.lumpTotal>0?`+${fmt(row.lumpTotal)}`:"—"}</td>
                              <td>
                                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                                  <div style={{ width:54, height:3, background:"rgba(255,255,255,.07)", borderRadius:2, overflow:"hidden" }}>
                                    <div style={{ width:`${pct}%`, height:"100%", background:hit?"#00ff87":"#60efff", borderRadius:2 }}/>
                                  </div>
                                  <span style={{ color:"#3a3a3a", fontSize:10 }}>{pct.toFixed(0)}%</span>
                                </div>
                              </td>
                              <td><span className={`pill ${hit?"g":pct>=70?"y":"r"}`}>{hit?"✓ ON TRACK":pct>=70?"BUILDING":"EARLY"}</span></td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}

            {/* ══ HOLDINGS ══ */}
            {activeTab==="holdings" && (
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:18 }} className="grid-2">

                <div className="card" style={{ display:"flex", flexDirection:"column", alignItems:"center" }}>
                  <div className="sec" style={{ alignSelf:"flex-start" }}>Full Portfolio Allocation</div>
                  <PieChart width={270} height={210}>
                    <Pie data={pieData} cx={135} cy={95} innerRadius={52} outerRadius={90} paddingAngle={2} dataKey="value">
                      {pieData.map((e,i) => <Cell key={i} fill={e.color}/>)}
                    </Pie>
                    <Tooltip formatter={v=>fmt(v)} contentStyle={{ background:"#0d1117", border:"1px solid #222", borderRadius:6, fontFamily:"DM Mono", fontSize:11 }}/>
                  </PieChart>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:"5px 12px", justifyContent:"center", marginTop:6 }}>
                    {pieData.map(d => (
                      <div key={d.name} style={{ display:"flex", alignItems:"center", gap:5, fontSize:10, color:"#888" }}>
                        <div style={{ width:7, height:7, borderRadius:1, background:d.color }}/>
                        {d.name}
                      </div>
                    ))}
                  </div>
                  <div style={{ marginTop:14, width:"100%", padding:"9px 12px", background:"rgba(167,139,250,.04)", border:"1px solid rgba(167,139,250,.12)", borderRadius:8, fontSize:11, color:"#a78bfa", textAlign:"center" }}>
                    VDHG tracked · excluded from DCA targeting
                  </div>
                </div>

                <div className="card">
                  <div className="sec">DCA Target Drift — Active Holdings Only</div>
                  <div style={{ display:"flex", flexDirection:"column", gap:9 }}>
                    {withDrift.map(h => {
                      const threshold = h.symbol==="IBTC" ? 1 : 5;
                      const breached  = Math.abs(h.drift) > threshold;
                      return (
                        <div key={h.symbol} style={{ background:"rgba(255,255,255,.02)", border:`1px solid ${breached?"rgba(255,107,107,.22)":"rgba(255,255,255,.06)"}`, borderRadius:8, padding:"10px 13px" }}>
                          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:5 }}>
                            <div style={{ display:"flex", alignItems:"center", gap:7 }}>
                              <div style={{ width:7, height:7, borderRadius:1, background:h.color }}/>
                              <span style={{ color:"#e8eaf0", fontWeight:500, fontSize:13 }}>{h.symbol}</span>
                              {breached && <span className="pill r">REBALANCE</span>}
                              {!breached && h.symbol===mostUnderweight?.symbol && <span className="pill g">BUY NEXT</span>}
                            </div>
                            <div>
                              <span style={{ color:"#fff", fontSize:13 }}>{fmtP(h.actual)}</span>
                              <span style={{ color:"#3a3a3a", fontSize:11, marginLeft:5 }}>/ {fmtP(h.targetPct)}</span>
                            </div>
                          </div>
                          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                            <div style={{ flex:1, height:3, background:"rgba(255,255,255,.06)", borderRadius:2, position:"relative" }}>
                              <div style={{ position:"absolute", left:`${Math.min(100,h.targetPct)}%`, top:-2, width:2, height:7, background:"#444", borderRadius:1 }}/>
                              <div style={{ width:`${Math.min(100,h.actual)}%`, height:"100%", background:breached?"#ff6b6b":h.color, borderRadius:2, opacity:.8 }}/>
                            </div>
                            <span style={{ fontSize:10, color:h.drift>0?"#ffd166":"#60efff", minWidth:48, textAlign:"right" }}>
                              {h.drift>0?"+":""}{fmtP(h.drift)}
                            </span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                <div className="card" style={{ gridColumn:"1 / -1" }}>
                  <div className="sec">All Holdings — Update Current Values</div>
                  <div style={{ overflowX:"auto" }}>
                    <table>
                      <thead><tr><th>ETF</th><th>Owner</th><th>Current Value ($)</th><th>Target</th><th>Live Chg</th><th>Live Value</th><th>Role</th></tr></thead>
                      <tbody>
                        {holdings.map((h,i) => {
                          const live = liveHoldings[i];
                          const isDivider = i === holdings.filter(x=>x.dca).length;
                          return (
                            <Fragment key={h.symbol+i}>
                              {isDivider && (
                                <tr>
                                  <td colSpan={7} style={{ padding:"10px 0 4px" }}>
                                    <div style={{ height:1, background:"rgba(167,139,250,.2)" }}/>
                                    <div style={{ fontSize:10, color:"#a78bfa", letterSpacing:".1em", textTransform:"uppercase", marginTop:8, marginLeft:10 }}>
                                      Observed Holdings — no contributions · value tracked only
                                    </div>
                                  </td>
                                </tr>
                              )}
                              <tr style={{ opacity:h.dca?1:0.75 }}>
                                <td>
                                  <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                                    <div style={{ width:7, height:7, borderRadius:1, background:h.color, flexShrink:0 }}/>
                                    <span style={{ color:h.dca?"#e8eaf0":"#a78bfa", fontWeight:500 }}>{h.symbol}</span>
                                  </div>
                                  <div style={{ fontSize:10, color:"#3a3a3a", marginTop:1 }}>{h.name}</div>
                                </td>
                                <td style={{ color:"#666", fontSize:11 }}>{h.owner}</td>
                                <td>
                                  <input type="number" value={holdings[i].value}
                                    onChange={e => {
                                      const u=[...holdings];
                                      u[i]={...u[i], value:parseFloat(e.target.value)||0};
                                      setHoldings(u);
                                    }}
                                    style={{ width:110 }}
                                  />
                                </td>
                                <td style={{ color:h.dca?h.color:"#3a3a3a", fontWeight:h.dca?500:400 }}>{h.targetPct!==null?fmtP(h.targetPct):"—"}</td>
                                <td style={{ color:live.chg!==null?(live.chg>=0?"#00ff87":"#ff6b6b"):"#2a2a2a", fontSize:11 }}>
                                  {live.chg!==null?`${live.chg>=0?"▲":"▼"} ${Math.abs(live.chg).toFixed(2)}%`:"—"}
                                </td>
                                <td style={{ color:"#fff", fontWeight:500 }}>{fmt(live.liveValue)}</td>
                                <td>{h.dca?<span className="pill g">DCA ACTIVE</span>:<span className="pill ob">OBSERVED</span>}</td>
                              </tr>
                            </Fragment>
                          );
                        })}
                        <tr style={{ borderTop:"1px solid rgba(255,255,255,.1)" }}>
                          <td colSpan={5} style={{ color:"#555", fontSize:11, paddingTop:12 }}>Total Portfolio</td>
                          <td style={{ color:"#00ff87", fontWeight:700, fontSize:14, paddingTop:12 }}>{fmt(liveTotal)}</td>
                          <td/>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}

            {/* ══ INPUTS ══ */}
            {activeTab==="inputs" && (
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:18 }} className="grid-2">
                <div className="card" style={{ display:"flex", flexDirection:"column", gap:18 }}>
                  <div className="sec">Core Parameters</div>
                  {[
                    { label:"Annual Return %",            val:annualReturn,  set:setAnnualReturn,  min:4,      max:15,      step:0.5,   f:v=>`${v}%` },
                    { label:"Current Age",                val:currentAge,    set:setCurrentAge,    min:25,     max:55,      step:1,     f:v=>`${v} yrs` },
                    { label:"Target Age (Work Optional)", val:targetAge,     set:setTargetAge,     min:35,     max:65,      step:1,     f:v=>`${v} yrs` },
                    { label:"Target Liquid Amount",       val:targetAmount,  set:setTargetAmount,  min:500000, max:5000000, step:50000, f:fmt },
                  ].map(it => (
                    <div key={it.label}>
                      <label>{it.label}</label>
                      <div className="sr">
                        <input type="range" min={it.min} max={it.max} step={it.step} value={it.val} onChange={e=>it.set(parseFloat(e.target.value))}/>
                        <span className="sv">{it.f(it.val)}</span>
                      </div>
                    </div>
                  ))}
                </div>

                <div style={{ display:"flex", flexDirection:"column", gap:18 }}>
                  <div className="card">
                    <div className="sec">Two-Phase Contributions</div>
                    <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
                      {[
                        { label:"Phase 1 Monthly (Mortgage focus)", val:phase1Monthly, set:setPhase1Monthly, min:500,  max:8000,  step:100, f:fmt },
                        { label:"Phase 2 Monthly (Accumulation)",   val:phase2Monthly, set:setPhase2Monthly, min:1000, max:15000, step:100, f:fmt },
                        { label:"Switch to Phase 2 after (years)",  val:phaseSwitch,   set:setPhaseSwitch,   min:1,    max:15,    step:1,   f:v=>`${v} yr` },
                      ].map(it => (
                        <div key={it.label}>
                          <label>{it.label}</label>
                          <div className="sr">
                            <input type="range" min={it.min} max={it.max} step={it.step} value={it.val} onChange={e=>it.set(+e.target.value)}/>
                            <span className="sv">{it.f(it.val)}</span>
                          </div>
                        </div>
                      ))}
                      <div style={{ background:"rgba(255,209,102,.05)", border:"1px solid rgba(255,209,102,.13)", borderRadius:8, padding:"9px 12px", fontSize:11, color:"#ffd166" }}>
                        Phase switch at age {currentAge+phaseSwitch} · +{fmt(phase2Monthly-phase1Monthly)}/mo increase
                      </div>
                    </div>
                  </div>

                  <div className="card">
                    <div className="sec">Lump Sum Injections</div>
                    <div style={{ display:"flex", flexDirection:"column", gap:8, marginBottom:14 }}>
                      {lumpSums.map(ls => (
                        <div key={ls.id} style={{ display:"flex", alignItems:"center", gap:8, background:"rgba(255,209,102,.04)", border:"1px solid rgba(255,209,102,.1)", borderRadius:8, padding:"9px 12px" }}>
                          <div style={{ flex:1 }}>
                            <div style={{ fontSize:12, color:"#e8eaf0", fontWeight:500 }}>{ls.label}</div>
                            <div style={{ fontSize:10, color:"#555", marginTop:2 }}>{fmt(ls.amount)} · {ls.recurring?"🔁 Annual":`Year ${ls.yearOffset}`}</div>
                          </div>
                          <button className="btn bg2" style={{ padding:"3px 9px", fontSize:11 }} onClick={()=>setLumpSums(p=>p.filter(l=>l.id!==ls.id))}>✕</button>
                        </div>
                      ))}
                    </div>
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:7, marginBottom:8 }}>
                      <div><label>Label</label><input type="text" value={newLump.label} onChange={e=>setNewLump(p=>({...p,label:e.target.value}))} placeholder="e.g. FMG Rotation"/></div>
                      <div><label>Amount ($)</label><input type="number" value={newLump.amount} onChange={e=>setNewLump(p=>({...p,amount:e.target.value}))} placeholder="45000"/></div>
                      <div><label>Year Offset</label><input type="number" value={newLump.yearOffset} onChange={e=>setNewLump(p=>({...p,yearOffset:e.target.value}))} placeholder="0" disabled={newLump.recurring}/></div>
                      <div style={{ display:"flex", alignItems:"flex-end", paddingBottom:1 }}>
                        <label style={{ display:"flex", alignItems:"center", gap:7, textTransform:"none", fontSize:12, color:"#999", cursor:"pointer" }}>
                          <input type="checkbox" checked={newLump.recurring} onChange={e=>setNewLump(p=>({...p,recurring:e.target.checked}))}/>
                          Recurring annually
                        </label>
                      </div>
                    </div>
                    <button className="btn bp" style={{ width:"100%" }} onClick={addLump}>+ Add Injection</button>
                  </div>
                </div>
              </div>
            )}

            {/* ══ ETF PRICES ══ */}
            {activeTab==="etf" && (
              <div style={{ display:"flex", flexDirection:"column", gap:18 }}>
                <div className="card">
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18 }}>
                    <div className="sec" style={{ marginBottom:0 }}>Live ASX ETF Prices — Full Portfolio</div>
                    <button className="btn bp" onClick={fetchPrices} disabled={etfLoading}>{etfLoading?"Fetching…":"↻ Refresh"}</button>
                  </div>
                  {etfError && <div style={{ color:"#ff6b6b", fontSize:11, marginBottom:14, padding:"9px 12px", background:"rgba(255,107,107,.07)", borderRadius:8, border:"1px solid rgba(255,107,107,.18)" }}>⚠ {etfError}</div>}
                  <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(190px,1fr))", gap:10 }}>
                    {[
                      { symbol:"IVV",  name:"iShares S&P 500",         color:"#00ff87", dca:true  },
                      { symbol:"VEU",  name:"Vanguard All-World ex-US", color:"#60efff", dca:true  },
                      { symbol:"VGE",  name:"Vanguard Emerging Markets",color:"#ff6b6b", dca:true  },
                      { symbol:"G200", name:"iShares S&P/ASX 200",      color:"#ffd166", dca:true  },
                      { symbol:"IBTC", name:"BetaShares Bitcoin ETF",   color:"#f97316", dca:true  },
                      { symbol:"VDHG", name:"Vanguard Diversified HG",  color:"#a78bfa", dca:false },
                    ].map(etf => {
                      const d = etfPrices[etf.symbol];
                      return (
                        <div key={etf.symbol} style={{ background:"rgba(255,255,255,.025)", border:"1px solid rgba(255,255,255,.06)", borderRadius:10, padding:"14px 16px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                          <div>
                            <div style={{ fontSize:15, fontWeight:700, fontFamily:"'Syne',sans-serif", color:etf.color }}>{etf.symbol}</div>
                            <div style={{ fontSize:10, color:"#444", marginTop:2 }}>{etf.name}</div>
                            <span className={`pill ${etf.dca?"g":"ob"}`} style={{ marginTop:5, display:"inline-block" }}>{etf.dca?"DCA ACTIVE":"OBSERVED"}</span>
                          </div>
                          <div style={{ textAlign:"right" }}>
                            {etfLoading
                              ? <div style={{ color:"#333", fontSize:11 }}>Loading…</div>
                              : d
                                ? <>
                                    <div style={{ fontSize:17, fontWeight:700, color:"#fff" }}>${parseFloat(d.price).toFixed(2)}</div>
                                    <div style={{ fontSize:11, color:parseFloat(d.change)>=0?"#00ff87":"#ff6b6b", marginTop:2 }}>
                                      {parseFloat(d.change)>=0?"▲":"▼"} {Math.abs(parseFloat(d.change)).toFixed(2)}%
                                    </div>
                                  </>
                                : <div style={{ color:"#2a2a2a", fontSize:13 }}>—</div>
                            }
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                <div className="card">
                  <div className="sec">This Month's DCA Guidance</div>
                  <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                    {[...withDrift].sort((a,b)=>a.drift-b.drift).map((h,i) => (
                      <div key={h.symbol} style={{ display:"flex", alignItems:"center", gap:12, padding:"10px 14px", background:i===0?"rgba(0,255,135,.05)":"rgba(255,255,255,.02)", border:`1px solid ${i===0?"rgba(0,255,135,.2)":"rgba(255,255,255,.05)"}`, borderRadius:8 }}>
                        <div style={{ width:7, height:7, borderRadius:1, background:h.color, flexShrink:0 }}/>
                        <div style={{ flex:1 }}>
                          <span style={{ color:"#e8eaf0", fontWeight:500 }}>{h.symbol}</span>
                          <span style={{ color:"#3a3a3a", fontSize:11, marginLeft:8 }}>{h.name}</span>
                        </div>
                        <span style={{ fontSize:11, color:h.drift>0?"#ffd166":"#60efff" }}>{h.drift>0?"+":""}{fmtP(h.drift)} vs target</span>
                        {i===0 && <span className="pill g">BUY THIS MONTH</span>}
                        {i>0 && h.drift>0 && <span className="pill y">OVERWEIGHT</span>}
                      </div>
                    ))}
                  </div>
                  <div style={{ marginTop:12, padding:"9px 12px", background:"rgba(96,239,255,.04)", border:"1px solid rgba(96,239,255,.1)", borderRadius:8, fontSize:11, color:"#60efff" }}>
                    💡 VDHG excluded from DCA targeting. Direct your {fmt(activeTab==="etf"?phase1Monthly:phase1Monthly)}/month to the most underweight active ETF above.
                  </div>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
